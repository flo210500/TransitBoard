name: TransitBoard
version: 1.0.0-b86
main: de.transitboard.TransitBoardPlugin
api-version: 1.20
description: Vollständiges Fahrgastinformationssystem für TrainCarts
author: TransitBoard

depend: []
softdepend:
  - Train_Carts

commands:
  transitboard:
    description: TrainDisplay Verwaltung
    usage: /transitboard <reload|status|list>
    aliases: [td]

permissions:
  transitboard.admin:
    description: Plugin-Verwaltung
    default: op
