# TransitBoard v2 Konfiguration
# ==============================
#
# FIS-Schilder werden NICHT hier eingetragen.
# Platziere ein Schild mit [TDANZEIGE] in Zeile 1 – das Plugin erkennt es automatisch.
#
# Hier werden nur Bahnhöfe und Gleise definiert, damit das Plugin
# die IDs auf den Schildern zuordnen kann.

sofort-threshold-seconds: 10   # Unter X Sekunden wird "Sofort" angezeigt
timing-history-size: 5
update-interval: 20

format-sofort:       "Sofort"
format-minutes:      "%d Min"
format-seconds:      "%d Sek"
format-line-prefix:  "[%s]"
format-no-service:   "Kein Betrieb"

# Wie lange ein angekommener Zug auf der Anzeige bleibt (in Sekunden).
# Sollte laenger sein als die Umlaufzeit der Zuege auf diesem Gleis.
holdover-seconds: 120


# Bahnhöfe – nur IDs und Gleise, keine Schild-Koordinaten nötig
#
# stations:
#   hbf:
#     display-name: "Hauptbahnhof"
#     gleise:
#       gleis1:
#         display-name: "Gl. 1"
#       gleis2:
#         display-name: "Gl. 2"

stations: {}

# Linien
# Eine Linie definiert die Reihenfolge der Stationen.
# type: ring    – Ring (letzter Stop → erster Stop)
# type: shuttle – Shuttle (letzter Stop → rückwärts)
#
# lines:
#   U1:
#     type: ring
#     color: "§1"
#     announcements:          ← optional, überschreibt globale Einstellungen
#       enabled: true         ← Bahnhofs-Ansagen an/aus
#       in-train: true        ← Innenraum-Ansagen an/aus
#       sequence-arrival: "intro,line,{prefix},{number},arriving,platform,{platform_number}"
#       sequence-departure: "intro,line,{prefix},{number},departing,platform,{platform_number}"
#       sequence-delay: "intro,line,{prefix},{number},delayed,approximately,{delay_minutes},minutes"
#     stops:
#       - {station: hbf,    gleis: gleis1}
#       - {station: bhf_a,  gleis: gleis1}
#       - {station: bhf_b,  gleis: gleis1}
#   S1:
#     type: shuttle
#     stops:
#       - {station: nord,   gleis: gleis1}
#       - {station: mitte,  gleis: gleis1}
#       - {station: sued,   gleis: gleis1}

lines: {}

# Ansagen
announcements:
  enabled: false
  radius: 50
  namespace: "meinserver"
  delay-between-sounds: 8
  volume: 1.0
  pitch: 1.0

  # Events
  on-arrival: true
  on-departure: true
  on-delay: true

  # Ab wie vielen Sekunden Verspätung eine Ansage (300 = 5 Min)
  delay-threshold-seconds: 300

  # Sound-Bausteine
  sounds:
    intro:         "traindisplay/intro"
    line:          "traindisplay/line"
    platform:      "traindisplay/platform"
    arriving:      "traindisplay/arriving"
    departing:     "traindisplay/departing"
    delayed:       "traindisplay/delayed"
    approximately: "traindisplay/approximately"
    minutes:       "traindisplay/minutes"
    u:           "traindisplay/u"
    s:           "traindisplay/s"
    numbers:       "traindisplay/numbers/"

  # Sequenzen – verfügbare Variablen:
  # {prefix}        = Linienpräfix (u oder s)
  # {nummer}        = Liniennummer (1, 2, ...)
  # {gleis_nummer}  = Gleisnummer
  # {delay_minuten} = Verspätung aufgerundet auf 5 Min
  sequence-arrival:   "intro,line,{prefix},{number},arriving,platform,{platform_number}"
  sequence-departure: "intro,line,{prefix},{number},departing,platform,{platform_number}"
  sequence-delay:     "intro,line,{prefix},{number},delayed,approximately,{delay_minutes},minutes"

  # Innenraum-Ansage (für Fahrgäste im Zug)
  in-train:
    enabled: true
    # Wie viele Sekunden vor Ankunft die Ansage gemacht wird
    threshold-seconds: 60
    # Sound-Pfad für Stationsnamen (+ stationsId + .ogg)
    stations-sound-path: "traindisplay/stations/"
    # Sequenz: next_station = fester Sound, {station_sound} = Stationsname
    sequence: "next_station,{station_sound}"
    # Chat-Nachricht Prefix (vor dem Stationsnamen)
    chat-prefix: "§8[§bZug§8] §7Nächste Station: §f"
    # Lautstärke für Innenraum-Ansage
    volume: 0.8
    pitch: 1.0
